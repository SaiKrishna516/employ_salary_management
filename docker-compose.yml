services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       salary_tool_production
      POSTGRES_USER:     salary_tool
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary_tool -d salary_tool_production"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV:         production
      PORT:              3001
      DATABASE_URL:      postgresql://salary_tool:${POSTGRES_PASSWORD}@db:5432/salary_tool_production
      RAILS_MASTER_KEY:  ${RAILS_MASTER_KEY:?RAILS_MASTER_KEY is required}
      ALLOWED_ORIGIN:    ${ALLOWED_ORIGIN:-http://localhost}
      RAILS_LOG_TO_STDOUT: "true"
      WEB_CONCURRENCY:   ${WEB_CONCURRENCY:-2}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    # Frontend src/lib is mounted so Rails can regenerate constants.json on boot.
    volumes:
      - ./frontend/src/lib:/frontend/src/lib
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/v1/employees?per_page=1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
